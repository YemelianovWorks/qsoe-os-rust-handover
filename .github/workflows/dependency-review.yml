name: Dependency review (non-blocking)

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/yarn.lock'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run dependency review
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - name: Record dependency review outcome
        if: always()
        run: |
          echo "dependency-review outcome: ${{ steps.dependency_review.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.dependency_review.outcome }}" != "success" ]; then
            echo "::warning title=Dependency review warning-mode outcome::dependency-review-action reported '${{ steps.dependency_review.outcome }}'. Check the previous step for repository support, dependency graph, or policy findings."
          fi
